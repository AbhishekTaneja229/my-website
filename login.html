<!DOCTYPE html>
<html>

<head>
  <title>Login</title>

<style>

body{
  font-family:Arial;
  background:#f4f4f4;
}

.login-box{
  width:300px;
  background:white;
  padding:30px;
  margin:100px auto;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
  width:90%;
  padding:10px;
  margin:10px 0;
}

button{
  padding:10px 20px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Company Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<br><br>

<button onclick="login()">Login</button>

</div>

<script>

function login(){

var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

if(user=="admin" && pass=="1234")
{
   window.location.href="index.html";
}
else
{
   alert("Wrong Username or Password");
}

}

</script>

</body>
</html>
